name: ASP.NET Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Soy un paso que no hace nada
        run: echo "¡Hola bueys!"

      - name: Soy otro paso innecesario
        run: whoami

      - name: Otro más, por si dos no fueran necesario
        run: pwd

      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restaurar paquetes
        run: dotnet restore

      - name: Compilar solución
        run: dotnet build --configuration Release --no-restore

      - name: Ejecutar Tests
        run: dotnet test --configuration Release --no-build --verbosity normal

      # Instalación de Swaks
      - name: Instalar Swaks
        if: always()
        run: |
          sudo apt-get update
          sudo apt-get install -y swaks

      # Envío del correo inyectando los secretos de forma directa y limpia
      - name: Enviar correo de notificación
        if: always()
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            ASUNTO="✅ Pipeline Exitoso: ASP.NET Tests"
            MENSAJE="El pipeline se ha ejecutado correctamente. Todos los tests de la solución .NET han pasado con éxito."
          else
            ASUNTO="❌ Pipeline Fallido: ASP.NET Tests"
            MENSAJE="Alerta: El pipeline ha fallado durante la ejecución. Por favor, revisa los logs de GitHub Actions para identificar el error."
          fi

          # Pasamos la variable $SMTP_PASS directamente al parámetro sin usar echo ni tuberías
          swaks --server smtp.gmail.com --port 587 --tls --auth LOGIN --auth-user "$SMTP_USER" --auth-password "$SMTP_PASS" --to "dawcarlospereira@gmail.com" --from "$SMTP_USER" --header "Subject: $ASUNTO" --body "$MENSAJE"
